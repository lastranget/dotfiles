palette = "everforest_light_medium"

add_newline = true
command_timeout = 1000

format = """
$character\
\
[█](fg:bg2 bg:black)\
$directory\
[█](fg:bg2 bg:background)\
$git_branch\
${custom.worktree}\
$git_status\
$package\
$cmd_duration\
$line_break\
[  ](fg:fg bg:background)\
[‎]()"""

[character]
format = "$symbol"
error_symbol = "[█](fg:red bg:bg0)[ ERROR](fg:red bg:bg0 inverted bold)[](fg:red bg:halfway_red)[](fg:halfway_red bg:bg2)"
success_symbol = "[█](fg:green bg:bg0)[ PROMPT](fg:green bg:bg0 inverted bold)[](fg:green bg:halfway)[](fg:halfway bg:bg2)"
vimcmd_symbol = "[█](fg:green bg:bg0)[ NORMAL](fg:green bg:bg0 inverted bold)[](fg:green bg:halfway)[](fg:halfway bg:bg2)"

[fill]
symbol = ' '
style = 'bg:background'

[cmd_duration]
min_time = 1000
show_milliseconds = false
disabled = false
format="[ 󰞌 $duration ]($style)"
style="bold fg:cyan bg:background"

[directory]
truncation_length = 5
format = "[󰉋 $path]($style)[$lock_symbol]($lock_style)"
style = "bold fg:fg bg:bg2"
read_only = "🔒"
read_only_style= "bold white"

[username]
show_always = true
style_user = "bg:bright-black"
style_root = "bg:bright-black"
format = '[ $user ]($style)'

[hostname]
format = "[ $hostname ]($style)"
ssh_only = false
trim_at = ".companyname.com"
disabled = false
style = "fg:green bg:bright-black"

[git_commit]
commit_hash_length = 8
style = "bold white"

[status]
style = "bg:background"
symbol = "💥 "
format = '($style)'
disabled = false

[git_branch]
format = "[ 󰘬 $branch ]($style)"
style = "bold bg:background fg:purple"

# Shows the worktree directory name only when the cwd is a *linked* git
# worktree (a linked worktree's git-dir lives under .git/worktrees/<name>; the
# main checkout's does not). Lets the prompt tell you which worktree you're in
# beyond just the branch.
[custom.worktree]
description = "Show the worktree directory name when inside a linked git worktree"
when = 'git rev-parse --git-dir 2>/dev/null | grep -q "/worktrees/"'
command = 'basename "$(git rev-parse --show-toplevel)"'
format = "[ 󰙅 $output ]($style)"
style = "bold bg:background fg:orange"
shell = ["bash", "--noprofile", "--norc"]
ignore_timeout = true

[git_status]
conflicted = '🏳️'
behind = '😰'
ahead = '🏎️💨'
diverged = '😵'
up_to_date = '✓'
untracked = '🤷'
stashed = '📦'
modified = '📝'
staged = '[++\($count\)](green)'
renamed = '👅'
deleted = '🗑️'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold bg:background fg:fg"

[package]
format = '[$version](208 bold) '


[palettes.everforest_light_medium]
bg0 = "#fdf6e3"
bg1 = "#f4f0d9"
bg2 = "#efebd4"
bg3 = "#e6e2cc"
bg4 = "#e0dcc7"
bg5 = "#bdc3af"
fg = "#5c6a72"
grey0 = "#a6b0a0"
grey1 = "#939f91"
grey2 = "#829181"
red = "#f85552"
orange = "#f57d26"
yellow = "#dfa000"
green = "#8da101"
cyan = "#35a77c"
blue = "#3a94c5"
purple = "#df69ba"
red_dim = "#e67e80"
orange_dim = "#e69875"
yellow_dim = "#dbbc7f"
green_dim = "#a7c080"
cyan_dim = "#83c092"
blue_dim = "#7fbbb3"
purple_dim = "#d699b6"
bg_green = "#f0f1d2"
background = "#fffbef"
halfway = "#c1c96d"
halfway_red = "#f6a295"
none = "NONE"
